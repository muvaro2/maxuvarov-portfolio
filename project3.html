<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Doe | Computer Engineering Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#121212',
                        darkgray: '#1E1E1E',
                        accent: '#3B82F6',
                        lightgray: '#E5E7EB',
                    }
                }
            }
        }
    </script>
    <style>
        html {
            scroll-behavior: smooth;
        }
        .project-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        .skill-link {
            transition: color 0.2s ease;
        }
        .skill-link:hover {
            color: #3B82F6;
        }
    </style>
</head>
<body class="bg-dark text-lightgray font-sans">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 bg-darkgray/90 backdrop-blur-sm z-50 shadow-md">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <a href="#" class="text-2xl font-bold text-white">John Doe</a>
                <nav class="hidden md:block">
                    <ul class="flex space-x-8">
                        <li><a href="#about" class="hover:text-accent transition-colors">About Me</a></li>
                        <li><a href="#projects" class="hover:text-accent transition-colors">Projects</a></li>
                        <li><a href="#skills" class="hover:text-accent transition-colors">Skills</a></li>
                        <li><a href="#resume" class="hover:text-accent transition-colors">Resume</a></li>
                        <li><a href="#contact" class="hover:text-accent transition-colors">Contact</a></li>
                    </ul>
                </nav>
                <button class="md:hidden text-xl">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="fixed inset-0 bg-darkgray z-40 hidden flex-col items-center justify-center space-y-8 text-xl" id="mobileMenu">
        <button class="absolute top-6 right-6 text-2xl">
            <i class="fas fa-times"></i>
        </button>
        <a href="#about" class="hover:text-accent transition-colors">About Me</a>
        <a href="#projects" class="hover:text-accent transition-colors">Projects</a>
        <a href="#skills" class="hover:text-accent transition-colors">Skills</a>
        <a href="#resume" class="hover:text-accent transition-colors">Resume</a>
        <a href="#contact" class="hover:text-accent transition-colors">Contact</a>
    </div>

    <main class="pt-240">
        <!-- About Me Section -->
        <section id="about" class="container mx-auto px-6 py-20">
        </section>

        <!-- Projects Section -->
        <section id="projects" class="bg-darkgray py-20">
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-darkgray py-8">
        <div class="container mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <p class="mb-4 md:mb-0"></p>
                <div class="flex space-x-6">
                    <a href="https://linkedin.com/in/johndoe" target="_blank" class="text-2xl hover:text-accent transition-colors">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a href="https://github.com/johndoe" target="_blank" class="text-2xl hover:text-accent transition-colors">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        const menuButton = document.querySelector('header button');
        const mobileMenu = document.getElementById('mobileMenu');
        const closeButton = mobileMenu.querySelector('button');
        
        menuButton.addEventListener('click', () => {
            mobileMenu.classList.remove('hidden');
            mobileMenu.classList.add('flex');
        });
        
        closeButton.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            mobileMenu.classList.remove('flex');
        });
        
        // Close mobile menu when clicking on a link
        const mobileLinks = mobileMenu.querySelectorAll('a');
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                mobileMenu.classList.remove('flex');
            });
        });
    </script>
</html>
